<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Device Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .button {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .button.primary {
        border-color: var(--accent);
        color: var(--accent);
      }

      .panel-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 980px) {
        .panel-grid {
          grid-template-columns: minmax(0, 1fr) minmax(280px, 36%);
        }
      }

      .panel-column {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.danger {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .error {
        border: 1px solid rgba(185, 28, 28, 0.35);
        background: rgba(185, 28, 28, 0.08);
        color: var(--danger);
      }

      .status-line {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div>
        <div class="title">Device Tools</div>
        <div id="device-subtitle" class="subtitle">Loading device context...</div>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="button primary">Refresh</button>
      </div>
    </div>

    <div id="error-panel" class="panel error" hidden></div>

    <div class="panel-grid">
      <div class="panel-column">
        <section class="panel">
          <h2>Diagnostics</h2>
          <div id="diagnostics-kv" class="kv"></div>
        </section>

        <section class="panel">
          <h2>Recommendation</h2>
          <div id="recommendation-content"></div>
        </section>

        <section class="panel">
          <h2>Profile Reference</h2>
          <div id="profile-reference-kv" class="kv"></div>
        </section>

        <section class="panel">
          <h2>Actions</h2>
          <div class="actions">
            <button class="button" disabled title="Available in next slice">Backfill Marker</button>
            <button class="button" disabled title="Available in next slice">Adopt Update</button>
          </div>
          <p class="hint">Read-only mode. Action controls are intentionally disabled in v1.</p>
        </section>
      </div>

      <aside class="panel-column">
        <section class="panel">
          <h2>Why</h2>
          <div id="why-kv" class="kv"></div>
        </section>
      </aside>
    </div>

    <div id="status-line" class="status-line">Initializing...</div>

    <script>
      (function () {
        const state = {
          loading: false,
          snapshot: null,
          error: null,
        };

        const reasonLabels = {
          'baseline-hash-changed': 'Compiled profile changed for this device.',
          'marker-missing-backfill':
            'Profile reference metadata is missing for this curated device.',
          'baseline-hash-unchanged': 'Current curated profile still matches the compiled baseline.',
          'profile-resolution-not-ready':
            'Runtime mapping has not been generated for this device yet.',
          'no-curation-entry': 'No curation exists yet for this device.',
          'missing-homey-device-id': 'Device identifier is unavailable in runtime diagnostics.',
          none: 'No recommendation is available.',
        };

        const refreshBtn = document.getElementById('refresh-btn');
        const statusLine = document.getElementById('status-line');
        const subtitle = document.getElementById('device-subtitle');
        const errorPanel = document.getElementById('error-panel');
        const diagnosticsKv = document.getElementById('diagnostics-kv');
        const recommendationContent = document.getElementById('recommendation-content');
        const profileRefKv = document.getElementById('profile-reference-kv');
        const whyKv = document.getElementById('why-kv');

        function formatIso(ts) {
          if (!ts) return 'n/a';
          const date = new Date(ts);
          if (Number.isNaN(date.getTime())) return String(ts);
          return date.toLocaleString();
        }

        function toSafeText(value) {
          if (value === null || typeof value === 'undefined' || value === '') return 'n/a';
          return String(value);
        }

        function setKvRows(container, rows) {
          container.innerHTML = rows
            .map(([key, value, className]) => {
              const valueClass = className ? ` ${className}` : '';
              return `<div class="k">${key}</div><div class="v${valueClass}">${toSafeText(value)}</div>`;
            })
            .join('');
        }

        function recommendationBadge(snapshot) {
          if (!snapshot.recommendation.actionable) {
            return '<span class="status-pill ok">No Action Needed</span>';
          }
          if (snapshot.recommendation.suggestedAction === 'backfill-marker') {
            return '<span class="status-pill warn">Profile Reference Missing</span>';
          }
          return '<span class="status-pill danger">Profile Update Available</span>';
        }

        function render() {
          refreshBtn.disabled = state.loading;
          errorPanel.hidden = !state.error;
          errorPanel.textContent = state.error ? state.error : '';

          if (!state.snapshot) {
            subtitle.textContent = state.loading
              ? 'Loading device context...'
              : 'No device data available.';
            diagnosticsKv.innerHTML = '';
            recommendationContent.innerHTML =
              '<p class="hint">No recommendation data available.</p>';
            profileRefKv.innerHTML = '';
            whyKv.innerHTML = '';
            statusLine.textContent = state.loading ? 'Loading snapshot...' : 'Idle';
            return;
          }

          const snapshot = state.snapshot;
          const deviceLabel =
            snapshot.device.nodeId !== null ? `Node ${snapshot.device.nodeId}` : 'Node';
          subtitle.textContent = `${deviceLabel} · ${snapshot.device.homeyDeviceId}`;

          setKvRows(diagnosticsKv, [
            ['Homey Class', snapshot.profile.homeyClass],
            ['Confidence', snapshot.profile.confidence],
            ['Profile ID', snapshot.profile.profileId, ' mono'],
            [
              'Match',
              `${toSafeText(snapshot.profile.matchBy)} / ${toSafeText(snapshot.profile.matchKey)}`,
            ],
            [
              'Inbound Mapping',
              `${snapshot.mapping.inboundEnabled}/${snapshot.mapping.inboundConfigured} enabled`,
            ],
            [
              'Outbound Mapping',
              `${snapshot.mapping.outboundEnabled}/${snapshot.mapping.outboundConfigured} enabled`,
            ],
            ['Curation Entry', snapshot.curation.entryPresent ? 'Present' : 'Missing'],
          ]);

          recommendationContent.innerHTML = `
            <div>${recommendationBadge(snapshot)}</div>
            <p class="hint" style="margin:8px 0 0;">${toSafeText(
              reasonLabels[snapshot.recommendation.reason] || snapshot.recommendation.reason,
            )}</p>
          `;

          setKvRows(profileRefKv, [
            ['Projection', snapshot.profileReference.projectionVersion],
            ['Current Hash', snapshot.profileReference.currentBaselineHash, ' mono'],
            ['Stored Hash', snapshot.profileReference.storedBaselineHash, ' mono'],
            ['Current Fingerprint', snapshot.profileReference.currentPipelineFingerprint, ' mono'],
            ['Stored Fingerprint', snapshot.profileReference.storedPipelineFingerprint, ' mono'],
          ]);

          setKvRows(whyKv, [
            [
              'Reason',
              reasonLabels[snapshot.recommendation.reason] || snapshot.recommendation.reason,
            ],
            ['Suggested Action', snapshot.recommendation.suggestedAction],
            ['Actionable', snapshot.recommendation.actionable ? 'Yes' : 'No'],
            ['Fallback Reason', snapshot.profile.fallbackReason],
            ['Last Sync', formatIso(snapshot.generatedAt)],
          ]);

          statusLine.textContent = state.loading
            ? 'Refreshing device snapshot...'
            : `Last updated ${formatIso(snapshot.generatedAt)}`;
        }

        async function loadSnapshot(eventName) {
          state.loading = true;
          state.error = null;
          render();
          try {
            state.snapshot = await Homey.emit(eventName);
          } catch (error) {
            const message = error && error.message ? error.message : 'Failed to load snapshot.';
            state.error = message;
          } finally {
            state.loading = false;
            render();
          }
        }

        refreshBtn.addEventListener('click', () => {
          loadSnapshot('device_tools:refresh');
        });

        Homey.ready();
        loadSnapshot('device_tools:get_snapshot');
      })();
    </script>
  </body>
</html>
