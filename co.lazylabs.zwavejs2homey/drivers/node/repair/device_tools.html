<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Device Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .button {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .button.primary {
        border-color: var(--accent);
        color: var(--accent);
      }

      .panel-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 980px) {
        .panel-grid {
          grid-template-columns: minmax(0, 1fr) minmax(280px, 36%);
        }
      }

      .panel-column {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.danger {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .error {
        border: 1px solid rgba(185, 28, 28, 0.35);
        background: rgba(185, 28, 28, 0.08);
        color: var(--danger);
      }

      .status-line {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-line.ok {
        color: var(--ok);
      }

      .status-line.warn {
        color: var(--warn);
      }

      .status-line.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div>
        <div class="title">Device Tools</div>
        <div id="device-subtitle" class="subtitle">Loading device context...</div>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="button primary">Refresh</button>
      </div>
    </div>

    <div id="error-panel" class="panel error" hidden></div>

    <div class="panel-grid">
      <div class="panel-column">
        <section class="panel">
          <h2>Diagnostics</h2>
          <div id="diagnostics-kv" class="kv"></div>
        </section>

        <section class="panel">
          <h2>Recommendation</h2>
          <div id="recommendation-content"></div>
        </section>

        <section class="panel">
          <h2>Profile Reference</h2>
          <div id="profile-reference-kv" class="kv"></div>
        </section>

        <section class="panel">
          <h2>Actions</h2>
          <div class="actions">
            <button id="backfill-btn" class="button">Backfill Marker</button>
            <button id="adopt-btn" class="button">Adopt Update</button>
          </div>
          <p id="action-hint" class="hint">
            Actions are available when a recommendation requires explicit confirmation.
          </p>
        </section>
      </div>

      <aside class="panel-column">
        <section class="panel">
          <h2>Why</h2>
          <div id="why-kv" class="kv"></div>
        </section>
      </aside>
    </div>

    <div id="status-line" class="status-line">Initializing...</div>

    <script>
      (function () {
        const state = {
          loading: false,
          actionInFlight: false,
          snapshot: null,
          error: null,
          statusMessage: null,
          statusTone: 'neutral',
        };

        const reasonLabels = {
          'baseline-hash-changed': 'Compiled profile changed for this device.',
          'marker-missing-backfill':
            'Profile reference metadata is missing for this curated device.',
          'baseline-hash-unchanged': 'Current curated profile still matches the compiled baseline.',
          'profile-resolution-not-ready':
            'Runtime mapping has not been generated for this device yet.',
          'no-curation-entry': 'No curation exists yet for this device.',
          'missing-homey-device-id': 'Device identifier is unavailable in runtime diagnostics.',
          none: 'No recommendation is available.',
        };

        const actionReasonLabels = {
          'action-mismatch':
            'That action is no longer applicable for this device. Refresh and retry.',
          'invalid-action-selection': 'Invalid action selection.',
          'invalid-homey-device-id': 'This device ID is invalid.',
          'node-not-found': 'The device could not be found.',
          'recommendation-unavailable': 'No recommendation is available for this device.',
          'baseline-hash-unchanged': 'No update is needed. Device profile is already aligned.',
          'no-curation-entry': 'No curation entry exists for this device.',
          'profile-resolution-not-ready': 'Runtime mapping is not ready yet for this device.',
          'missing-homey-device-id': 'Device identifier is unavailable in runtime diagnostics.',
          none: 'No action was required.',
        };

        const refreshBtn = document.getElementById('refresh-btn');
        const statusLine = document.getElementById('status-line');
        const subtitle = document.getElementById('device-subtitle');
        const errorPanel = document.getElementById('error-panel');
        const diagnosticsKv = document.getElementById('diagnostics-kv');
        const recommendationContent = document.getElementById('recommendation-content');
        const profileRefKv = document.getElementById('profile-reference-kv');
        const whyKv = document.getElementById('why-kv');
        const backfillBtn = document.getElementById('backfill-btn');
        const adoptBtn = document.getElementById('adopt-btn');
        const actionHint = document.getElementById('action-hint');

        function formatIso(ts) {
          if (!ts) return 'n/a';
          const date = new Date(ts);
          if (Number.isNaN(date.getTime())) return String(ts);
          return date.toLocaleString();
        }

        function toSafeText(value) {
          if (value === null || typeof value === 'undefined' || value === '') return 'n/a';
          return String(value);
        }

        function setKvRows(container, rows) {
          container.innerHTML = rows
            .map(([key, value, className]) => {
              const valueClass = className ? ` ${className}` : '';
              return `<div class="k">${key}</div><div class="v${valueClass}">${toSafeText(value)}</div>`;
            })
            .join('');
        }

        function recommendationBadge(snapshot) {
          if (!snapshot.recommendation.actionable) {
            return '<span class="status-pill ok">No Action Needed</span>';
          }
          if (snapshot.recommendation.suggestedAction === 'backfill-marker') {
            return '<span class="status-pill warn">Profile Reference Missing</span>';
          }
          return '<span class="status-pill danger">Profile Update Available</span>';
        }

        function render() {
          refreshBtn.disabled = state.loading || state.actionInFlight;
          errorPanel.hidden = !state.error;
          errorPanel.textContent = state.error ? state.error : '';
          statusLine.classList.remove('ok', 'warn', 'error');
          if (state.statusTone === 'ok') statusLine.classList.add('ok');
          if (state.statusTone === 'warn') statusLine.classList.add('warn');
          if (state.statusTone === 'error') statusLine.classList.add('error');

          if (!state.snapshot) {
            subtitle.textContent = state.loading
              ? 'Loading device context...'
              : 'No device data available.';
            diagnosticsKv.innerHTML = '';
            recommendationContent.innerHTML =
              '<p class="hint">No recommendation data available.</p>';
            profileRefKv.innerHTML = '';
            whyKv.innerHTML = '';
            backfillBtn.disabled = true;
            adoptBtn.disabled = true;
            actionHint.textContent = 'No action context available.';
            statusLine.textContent =
              state.statusMessage || (state.loading ? 'Loading snapshot...' : 'Idle');
            return;
          }

          const snapshot = state.snapshot;
          const isBusy = state.loading || state.actionInFlight;
          const canBackfill =
            snapshot.recommendation.actionable &&
            snapshot.recommendation.suggestedAction === 'backfill-marker';
          const canAdopt =
            snapshot.recommendation.actionable &&
            snapshot.recommendation.suggestedAction === 'adopt-recommended-baseline';
          backfillBtn.disabled = isBusy || !canBackfill;
          adoptBtn.disabled = isBusy || !canAdopt;
          const deviceLabel =
            snapshot.device.nodeId !== null ? `Node ${snapshot.device.nodeId}` : 'Node';
          subtitle.textContent = `${deviceLabel} · ${snapshot.device.homeyDeviceId}`;

          setKvRows(diagnosticsKv, [
            ['Homey Class', snapshot.profile.homeyClass],
            ['Confidence', snapshot.profile.confidence],
            ['Profile ID', snapshot.profile.profileId, ' mono'],
            [
              'Match',
              `${toSafeText(snapshot.profile.matchBy)} / ${toSafeText(snapshot.profile.matchKey)}`,
            ],
            [
              'Inbound Mapping',
              `${snapshot.mapping.inboundEnabled}/${snapshot.mapping.inboundConfigured} enabled`,
            ],
            [
              'Outbound Mapping',
              `${snapshot.mapping.outboundEnabled}/${snapshot.mapping.outboundConfigured} enabled`,
            ],
            ['Curation Entry', snapshot.curation.entryPresent ? 'Present' : 'Missing'],
          ]);

          recommendationContent.innerHTML = `
            <div>${recommendationBadge(snapshot)}</div>
            <p class="hint" style="margin:8px 0 0;">${toSafeText(
              reasonLabels[snapshot.recommendation.reason] || snapshot.recommendation.reason,
            )}</p>
          `;

          setKvRows(profileRefKv, [
            ['Projection', snapshot.profileReference.projectionVersion],
            ['Current Hash', snapshot.profileReference.currentBaselineHash, ' mono'],
            ['Stored Hash', snapshot.profileReference.storedBaselineHash, ' mono'],
            ['Current Fingerprint', snapshot.profileReference.currentPipelineFingerprint, ' mono'],
            ['Stored Fingerprint', snapshot.profileReference.storedPipelineFingerprint, ' mono'],
          ]);

          setKvRows(whyKv, [
            [
              'Reason',
              reasonLabels[snapshot.recommendation.reason] || snapshot.recommendation.reason,
            ],
            ['Suggested Action', snapshot.recommendation.suggestedAction],
            ['Actionable', snapshot.recommendation.actionable ? 'Yes' : 'No'],
            ['Fallback Reason', snapshot.profile.fallbackReason],
            ['Last Sync', formatIso(snapshot.generatedAt)],
          ]);

          if (canBackfill) {
            actionHint.textContent =
              'Profile reference metadata is missing. You can backfill marker metadata now.';
          } else if (canAdopt) {
            actionHint.textContent =
              'A compiled profile update is available. You can adopt it for this device.';
          } else {
            actionHint.textContent =
              'No action is required right now. This device is already aligned with its profile state.';
          }

          if (state.statusMessage) {
            statusLine.textContent = state.statusMessage;
          } else if (state.loading) {
            statusLine.textContent = 'Refreshing device snapshot...';
          } else if (state.actionInFlight) {
            statusLine.textContent = 'Applying action...';
          } else {
            statusLine.textContent = `Last updated ${formatIso(snapshot.generatedAt)}`;
          }
        }

        async function loadSnapshot(eventName) {
          state.loading = true;
          state.error = null;
          state.statusMessage = null;
          state.statusTone = 'neutral';
          render();
          try {
            state.snapshot = await Homey.emit(eventName);
          } catch (error) {
            const message = error && error.message ? error.message : 'Failed to load snapshot.';
            state.error = message;
            state.statusTone = 'error';
          } finally {
            state.loading = false;
            render();
          }
        }

        function describeActionResult(actionResult) {
          if (!actionResult || typeof actionResult !== 'object') return 'Action completed.';
          if (actionResult.executed === true) {
            if (actionResult.selectedAction === 'backfill-marker') {
              return {
                message: 'Backfill completed. Profile Reference metadata has been updated.',
                tone: 'ok',
              };
            }
            if (actionResult.selectedAction === 'adopt-recommended-baseline') {
              return {
                message: 'Profile update adopted for this device.',
                tone: 'ok',
              };
            }
            return { message: 'Action completed.', tone: 'ok' };
          }
          const reason =
            actionResult.reason && typeof actionResult.reason === 'string'
              ? actionResult.reason
              : 'action-not-executed';
          return {
            message: actionReasonLabels[reason] || `Action not executed: ${reason}`,
            tone: 'warn',
          };
        }

        async function executeAction(actionSelection, confirmationText) {
          if (!state.snapshot) return;
          if (!window.confirm(confirmationText)) return;

          state.actionInFlight = true;
          state.error = null;
          state.statusMessage = 'Applying action...';
          state.statusTone = 'neutral';
          render();

          try {
            const result = await Homey.emit('device_tools:execute_action', {
              action: actionSelection,
            });
            if (result && typeof result === 'object' && result.snapshot) {
              state.snapshot = result.snapshot;
            } else {
              state.snapshot = await Homey.emit('device_tools:refresh');
            }
            const actionResult =
              result && typeof result === 'object' ? result.actionResult : undefined;
            const summary = describeActionResult(actionResult);
            state.statusMessage = summary.message;
            state.statusTone = summary.tone;
          } catch (error) {
            const message = error && error.message ? error.message : 'Action failed.';
            state.error = message;
            state.statusMessage = null;
            state.statusTone = 'error';
          } finally {
            state.actionInFlight = false;
            render();
          }
        }

        refreshBtn.addEventListener('click', () => {
          loadSnapshot('device_tools:refresh');
        });
        backfillBtn.addEventListener('click', () => {
          executeAction(
            'backfill-marker',
            'Backfill Profile Reference for this device? This writes marker metadata only.',
          );
        });
        adoptBtn.addEventListener('click', () => {
          executeAction(
            'adopt-recommended-baseline',
            'Adopt the compiled profile update for this device? This removes current curation for this device.',
          );
        });

        Homey.ready();
        loadSnapshot('device_tools:get_snapshot');
      })();
    </script>
  </body>
</html>
