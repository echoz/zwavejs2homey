<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Node Import Summary</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --accent: #1d4ed8;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 8px 0;
        color: var(--muted);
        line-height: 1.4;
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
        margin-top: 10px;
      }

      .kv .k {
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: #0f766e;
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: #b45309;
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.error {
        color: #b91c1c;
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .warnings {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .warnings li {
        color: #b45309;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .button {
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        cursor: pointer;
      }

      .button.secondary {
        border-color: var(--panel-border);
        color: var(--text);
      }

      .section-title {
        margin: 14px 0 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }

      .node-table-wrap {
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        overflow: auto;
      }

      .node-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .node-table th,
      .node-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--panel-border);
        text-align: left;
        vertical-align: top;
      }

      .node-table thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--panel);
        color: var(--muted);
        font-weight: 600;
      }

      .node-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .pill-ok {
        color: #0f766e;
      }

      .pill-warn {
        color: #b45309;
      }

      .pill-action {
        color: #b91c1c;
      }

      .table-empty {
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Node Import Complete</h1>
      <p>Your selected nodes were added to Homey.</p>
      <p>Use this summary to confirm import status and remaining devices.</p>
      <div id="status-kv" class="kv"></div>
      <h2 class="section-title">Imported Nodes</h2>
      <p id="imported-meta" class="hint">Waiting for import summary…</p>
      <div id="imported-table-wrap" class="node-table-wrap" hidden>
        <table class="node-table">
          <thead>
            <tr>
              <th>Node</th>
              <th>Bridge</th>
              <th>Identity</th>
              <th>Profile</th>
              <th>Recommendation</th>
            </tr>
          </thead>
          <tbody id="imported-table-body"></tbody>
        </table>
      </div>
      <div id="imported-empty" class="table-empty" hidden>No nodes imported yet.</div>
      <ul id="warnings" class="warnings" hidden></ul>
      <p id="status-line" class="hint">Loading status...</p>
      <div class="button-group">
        <button id="refresh-btn" class="button secondary">Refresh Status</button>
        <button id="done-btn" class="button">Done</button>
      </div>
    </section>

    <script src="./import_summary.presenter.js"></script>
    <script src="./import_summary.page.js"></script>
  </body>
</html>
