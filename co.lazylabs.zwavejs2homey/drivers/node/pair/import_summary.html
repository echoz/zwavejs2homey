<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Node Import Summary</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --accent: #1d4ed8;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 8px 0;
        color: var(--muted);
        line-height: 1.4;
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
        margin-top: 10px;
      }

      .kv .k {
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: #0f766e;
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: #b45309;
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.error {
        color: #b91c1c;
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .warnings {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .warnings li {
        color: #b45309;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .button {
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        cursor: pointer;
      }

      .button.secondary {
        border-color: var(--panel-border);
        color: var(--text);
      }

      .section-title {
        margin: 14px 0 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }

      .node-table-wrap {
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        overflow: auto;
      }

      .node-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .node-table th,
      .node-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--panel-border);
        text-align: left;
        vertical-align: top;
      }

      .node-table thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--panel);
        color: var(--muted);
        font-weight: 600;
      }

      .node-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .pill-ok {
        color: #0f766e;
      }

      .pill-warn {
        color: #b45309;
      }

      .pill-action {
        color: #b91c1c;
      }

      .table-empty {
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Node Import Complete</h1>
      <p>Your selected nodes were added to Homey.</p>
      <p>Use this summary to confirm import status and remaining devices.</p>
      <div id="status-kv" class="kv"></div>
      <h2 class="section-title">Imported Nodes</h2>
      <p id="imported-meta" class="hint">Waiting for import summary…</p>
      <div id="imported-table-wrap" class="node-table-wrap" hidden>
        <table class="node-table">
          <thead>
            <tr>
              <th>Node</th>
              <th>Bridge</th>
              <th>Identity</th>
              <th>Profile</th>
              <th>Recommendation</th>
            </tr>
          </thead>
          <tbody id="imported-table-body"></tbody>
        </table>
      </div>
      <div id="imported-empty" class="table-empty" hidden>No nodes imported yet.</div>
      <ul id="warnings" class="warnings" hidden></ul>
      <p id="status-line" class="hint">Loading status...</p>
      <div class="button-group">
        <button id="refresh-btn" class="button secondary">Refresh Status</button>
        <button id="done-btn" class="button">Done</button>
      </div>
    </section>

    <script>
      (function () {
        const state = {
          loading: false,
          status: null,
          error: null,
        };

        const statusKv = document.getElementById('status-kv');
        const warningsEl = document.getElementById('warnings');
        const statusLine = document.getElementById('status-line');
        const importedTableWrap = document.getElementById('imported-table-wrap');
        const importedTableBody = document.getElementById('imported-table-body');
        const importedEmpty = document.getElementById('imported-empty');
        const importedMeta = document.getElementById('imported-meta');
        const refreshBtn = document.getElementById('refresh-btn');
        const doneBtn = document.getElementById('done-btn');

        function asText(value) {
          if (value === null || typeof value === 'undefined' || value === '') return 'n/a';
          return String(value);
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function asHtml(value) {
          return escapeHtml(asText(value));
        }

        function asTime(value) {
          if (!value) return 'n/a';
          const parsed = new Date(value);
          if (Number.isNaN(parsed.getTime())) return String(value);
          return parsed.toLocaleString();
        }

        function connectionPill(status) {
          if (!status || !status.zwjs || status.zwjs.available !== true) {
            return '<span class="status-pill error">Unavailable</span>';
          }
          if (status.zwjs.transportConnected === true) {
            return '<span class="status-pill ok">Connected</span>';
          }
          return '<span class="status-pill warn">Disconnected</span>';
        }

        function setKvRows(rows) {
          if (!Array.isArray(rows) || rows.length === 0) {
            statusKv.innerHTML = '<div class="k">Status</div><div class="v">n/a</div>';
            return;
          }
          statusKv.innerHTML = rows
            .map(
              ([key, value]) =>
                `<div class="k">${escapeHtml(key)}</div><div class="v">${asHtml(value)}</div>`,
            )
            .join('');
        }

        function importStatusLabel(status) {
          if (!status || !status.zwjs || status.zwjs.available !== true) {
            return 'Bridge Not Configured';
          }
          if (status.zwjs.transportConnected !== true) {
            return 'Bridge Disconnected';
          }
          if (typeof status.pendingImportNodes === 'number' && status.pendingImportNodes > 0) {
            return `Ready to Import (${status.pendingImportNodes} pending)`;
          }
          if (typeof status.importedNodes === 'number' && status.importedNodes > 0) {
            return 'Imported and Up to Date';
          }
          if (status.discoveredNodes === 0) {
            return 'No Discoverable Nodes';
          }
          return 'Status Unknown';
        }

        function recommendationClass(action) {
          if (action === 'backfill-marker') return 'pill-warn';
          if (action === 'adopt-recommended-baseline') return 'pill-action';
          return 'pill-ok';
        }

        function recommendationLabel(action) {
          if (action === 'backfill-marker') return 'Backfill Marker';
          if (action === 'adopt-recommended-baseline') return 'Adopt Update';
          return 'No Action';
        }

        function renderImportedNodes(status) {
          const entries = Array.isArray(status.importedNodeDetails) ? status.importedNodeDetails : [];
          const importedCount =
            typeof status.importedNodes === 'number' && status.importedNodes >= 0
              ? status.importedNodes
              : entries.length;
          const bridgeLabel = asText(status.bridgeId);
          if (entries.length === 0) {
            importedTableWrap.hidden = true;
            importedTableBody.innerHTML = '';
            importedEmpty.hidden = false;
            importedMeta.textContent = `Imported ${importedCount} node(s) on bridge ${bridgeLabel}.`;
            importedEmpty.textContent =
              importedCount > 0
                ? 'Imported nodes exist but detailed diagnostics are unavailable in this session.'
                : 'No nodes imported yet for this bridge.';
            return;
          }

          importedTableWrap.hidden = false;
          importedEmpty.hidden = true;
          importedMeta.textContent = `Showing ${entries.length} imported node(s) on bridge ${bridgeLabel}.`;
          importedTableBody.innerHTML = entries
            .map((entry) => {
              const manufacturer = asText(entry.manufacturer);
              const product = asText(entry.product);
              const location = asText(entry.location);
              const status = asText(entry.status);
              const profileId = asText(entry.profileId);
              const profileClass = asText(entry.profileHomeyClass);
              const profileMatch = asText(entry.profileMatch);
              const recommendationReason = asText(entry.recommendationReason);
              return `
                <tr>
                  <td>#${asHtml(entry.nodeId)}<br /><span class="hint">${asHtml(entry.name)}</span></td>
                  <td>${asHtml(entry.bridgeId)}</td>
                  <td>
                    ${asHtml(manufacturer)} / ${asHtml(product)}<br />
                    <span class="hint">Location: ${asHtml(location)}</span><br />
                    <span class="hint">Status: ${asHtml(status)}</span>
                  </td>
                  <td>
                    Class: ${asHtml(profileClass)}<br />
                    <span class="hint">${asHtml(profileId)}</span><br />
                    <span class="hint">${asHtml(profileMatch)}</span>
                  </td>
                  <td>
                    <span class="${recommendationClass(entry.recommendationAction)}">${recommendationLabel(
                      entry.recommendationAction,
                    )}</span><br />
                    <span class="hint">${asHtml(recommendationReason)}</span>
                  </td>
                </tr>
              `;
            })
            .join('');
        }

        function render() {
          refreshBtn.disabled = state.loading;
          if (!state.status) {
            setKvRows([]);
            warningsEl.hidden = true;
            warningsEl.innerHTML = '';
            importedTableWrap.hidden = true;
            importedTableBody.innerHTML = '';
            importedEmpty.hidden = false;
            importedMeta.textContent = 'Waiting for import summary…';
            statusLine.textContent = state.loading
              ? 'Loading status...'
              : state.error || 'Status unavailable.';
            return;
          }

          const status = state.status;
          setKvRows([
            ['Import Status', importStatusLabel(status)],
            ['Bridge', asText(status.bridgeId)],
            ['ZWJS', connectionPill(status)],
            ['Lifecycle', asText(status.zwjs && status.zwjs.lifecycle)],
            ['ZWJS Server', asText(status.zwjs && status.zwjs.serverVersion)],
            ['Discovered Nodes', status.discoveredNodes],
            ['Imported Nodes', status.importedNodes],
            ['Pending Import', status.pendingImportNodes],
            ['Updated', asTime(status.generatedAt)],
          ]);

          const warnings = Array.isArray(status.warnings) ? status.warnings : [];
          if (warnings.length > 0) {
            warningsEl.hidden = false;
            warningsEl.innerHTML = warnings
              .map((warning) => `<li>${asHtml(warning)}</li>`)
              .join('');
          } else {
            warningsEl.hidden = true;
            warningsEl.innerHTML = '';
          }
          renderImportedNodes(status);

          statusLine.textContent = state.error || `Status loaded at ${asTime(status.generatedAt)}.`;
        }

        async function loadStatus() {
          state.loading = true;
          state.error = null;
          render();
          try {
            state.status = await Homey.emit('import_summary:get_status');
          } catch (error) {
            state.status = null;
            state.error = error && error.message ? error.message : 'Failed to load status.';
          } finally {
            state.loading = false;
            render();
          }
        }

        refreshBtn.addEventListener('click', () => {
          loadStatus();
        });
        doneBtn.addEventListener('click', () => {
          Homey.done();
        });

        Homey.ready();
        loadStatus();
      })();
    </script>
  </body>
</html>
