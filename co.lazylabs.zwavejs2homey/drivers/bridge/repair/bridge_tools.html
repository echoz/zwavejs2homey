<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bridge Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .button {
        border: 1px solid var(--accent);
        background: var(--panel);
        color: var(--accent);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }

      @media (min-width: 980px) {
        .grid {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .section-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .section-toolbar h2 {
        margin: 0;
      }

      .toggle-group {
        display: inline-flex;
        gap: 6px;
      }

      .toggle-button {
        border: 1px solid var(--panel-border);
        background: transparent;
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .toggle-button.is-active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(29, 78, 216, 0.08);
      }

      details {
        border: 1px dashed var(--panel-border);
        border-radius: 10px;
        padding: 8px 10px;
        background: rgba(100, 116, 139, 0.04);
      }

      details[open] {
        background: transparent;
      }

      summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::before {
        content: '▸ ';
      }

      details[open] summary::before {
        content: '▾ ';
      }

      .advanced-content {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .advanced-content h3 {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }

      .nodes-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .nodes-table th,
      .nodes-table td {
        text-align: left;
        border-bottom: 1px solid var(--panel-border);
        padding: 6px 4px;
        vertical-align: top;
      }

      .nodes-table th {
        color: var(--muted);
        font-weight: 600;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.danger {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .status {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.error {
        color: var(--danger);
      }

      .error {
        border: 1px solid rgba(185, 28, 28, 0.35);
        background: rgba(185, 28, 28, 0.08);
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div>
        <div class="title">Bridge Tools</div>
        <div id="subtitle" class="subtitle">Loading bridge diagnostics...</div>
      </div>
      <button id="refresh-btn" class="button">Refresh</button>
    </div>

    <div id="error-panel" class="panel error" hidden></div>

    <div class="grid">
      <section class="panel">
        <h2>Runtime</h2>
        <div id="runtime-kv" class="kv"></div>
      </section>
      <section class="panel">
        <h2>Node Summary</h2>
        <div id="summary-kv" class="kv"></div>
      </section>
    </div>

    <section class="panel" style="margin-top: 12px">
      <h2>Advanced</h2>
      <details>
        <summary>Show advanced diagnostics</summary>
        <div class="advanced-content">
          <h3>Runtime Detail</h3>
          <div id="runtime-advanced-kv" class="kv"></div>
        </div>
      </details>
    </section>

    <section class="panel" style="margin-top: 12px">
      <div class="section-toolbar">
        <h2>Nodes</h2>
        <div class="toggle-group">
          <button id="filter-action-needed-btn" class="toggle-button is-active">Action Needed</button>
          <button id="filter-all-btn" class="toggle-button">All</button>
        </div>
      </div>
      <div id="nodes-meta" class="hint" style="margin-bottom: 8px"></div>
      <div id="nodes-empty" class="hint" hidden>No imported node devices found.</div>
      <table id="nodes-table" class="nodes-table" hidden>
        <thead>
          <tr>
            <th>Node</th>
            <th>Class</th>
            <th>Profile</th>
            <th>Recommendation</th>
            <th>Mapping</th>
          </tr>
        </thead>
        <tbody id="nodes-tbody"></tbody>
      </table>
    </section>

    <div id="status" class="status">Initializing...</div>

    <script>
      (function () {
        const state = {
          loading: false,
          snapshot: null,
          error: null,
          status: 'Initializing...',
          tone: 'neutral',
          filterMode: 'action-needed',
        };

        const subtitleEl = document.getElementById('subtitle');
        const refreshBtn = document.getElementById('refresh-btn');
        const filterActionNeededBtn = document.getElementById('filter-action-needed-btn');
        const filterAllBtn = document.getElementById('filter-all-btn');
        const runtimeKv = document.getElementById('runtime-kv');
        const runtimeAdvancedKv = document.getElementById('runtime-advanced-kv');
        const summaryKv = document.getElementById('summary-kv');
        const nodesMeta = document.getElementById('nodes-meta');
        const nodesTable = document.getElementById('nodes-table');
        const nodesEmpty = document.getElementById('nodes-empty');
        const nodesTbody = document.getElementById('nodes-tbody');
        const statusEl = document.getElementById('status');
        const errorPanel = document.getElementById('error-panel');

        function asText(value) {
          if (value === null || typeof value === 'undefined' || value === '') return 'n/a';
          return String(value);
        }

        function asTime(value) {
          if (!value) return 'n/a';
          const parsed = new Date(value);
          if (Number.isNaN(parsed.getTime())) return String(value);
          return parsed.toLocaleString();
        }

        function asTimeOrNull(value) {
          if (!value) return null;
          const parsed = new Date(value);
          if (Number.isNaN(parsed.getTime())) return String(value);
          return parsed.toLocaleString();
        }

        function isMissingValue(value) {
          if (value === null || typeof value === 'undefined') return true;
          if (typeof value === 'string' && value.trim().length === 0) return true;
          return false;
        }

        function setKv(container, rows, options) {
          const omitEmpty = options && options.omitEmpty === true;
          const normalizedRows = omitEmpty
            ? rows.filter((row) => !isMissingValue(row[1]))
            : rows;
          if (normalizedRows.length === 0) {
            container.innerHTML =
              '<div class="k">Details</div><div class="v hint">No data available.</div>';
            return;
          }
          container.innerHTML = normalizedRows
            .map(([key, value, className]) => {
              const nextClass = className ? ` ${className}` : '';
              return `<div class=\"k\">${key}</div><div class=\"v${nextClass}\">${asText(value)}</div>`;
            })
            .join('');
        }

        function recommendationPriority(node) {
          if (node.recommendation.backfillNeeded) return 0;
          if (node.recommendation.available) return 1;
          return 2;
        }

        function recommendationPill(node) {
          if (node.recommendation.backfillNeeded) {
            return '<span class="status-pill warn">Backfill Marker</span>';
          }
          if (node.recommendation.available) {
            return '<span class="status-pill danger">Adopt Update</span>';
          }
          return '<span class="status-pill ok">No Action</span>';
        }

        function recommendationLabel(node) {
          if (node.recommendation.backfillNeeded) return 'Backfill marker';
          if (node.recommendation.available) return 'Adopt update';
          return 'None';
        }

        function profileConfidenceLabel(node) {
          const attribution =
            node.profileAttribution && typeof node.profileAttribution === 'object'
              ? node.profileAttribution
              : null;
          if (attribution && attribution.confidenceLabel) {
            return attribution.confidenceLabel;
          }
          const confidence =
            node.profile && typeof node.profile.confidence === 'string'
              ? node.profile.confidence.trim().toLowerCase()
              : '';
          if (confidence === 'curated') return 'Curated profile match';
          if (confidence === 'ha-derived') return 'Home Assistant-derived profile match';
          if (confidence === 'generic') return 'Generic fallback profile';
          return 'Unknown profile confidence';
        }

        function profileSourceLabel(node) {
          const attribution =
            node.profileAttribution && typeof node.profileAttribution === 'object'
              ? node.profileAttribution
              : null;
          if (attribution && attribution.sourceLabel) return attribution.sourceLabel;
          const hasProfile =
            node.profile &&
            (node.profile.profileId || node.profile.fallbackReason);
          if (!hasProfile) return 'Profile resolution pending';
          if (node.curation && node.curation.entryPresent) {
            return 'Compiled profile + device override';
          }
          return 'Compiled profile only';
        }

        function render() {
          refreshBtn.disabled = state.loading;
          filterActionNeededBtn.disabled = state.loading;
          filterAllBtn.disabled = state.loading;
          filterActionNeededBtn.classList.toggle('is-active', state.filterMode === 'action-needed');
          filterAllBtn.classList.toggle('is-active', state.filterMode === 'all');
          statusEl.classList.remove('ok', 'warn', 'error');
          if (state.tone === 'ok') statusEl.classList.add('ok');
          if (state.tone === 'warn') statusEl.classList.add('warn');
          if (state.tone === 'error') statusEl.classList.add('error');
          statusEl.textContent = state.status;
          errorPanel.hidden = !state.error;
          errorPanel.textContent = state.error ? state.error : '';

          if (!state.snapshot) {
            subtitleEl.textContent = state.loading
              ? 'Loading bridge diagnostics...'
              : 'No diagnostics available.';
            filterActionNeededBtn.textContent = 'Action Needed';
            filterAllBtn.textContent = 'All';
            runtimeKv.innerHTML = '';
            runtimeAdvancedKv.innerHTML = '';
            summaryKv.innerHTML = '';
            nodesMeta.textContent = '';
            nodesEmpty.hidden = false;
            nodesTable.hidden = true;
            nodesTbody.innerHTML = '';
            return;
          }

          const snapshot = state.snapshot;
          subtitleEl.textContent = `Bridge ${asText(snapshot.device.bridgeId)} · ${asText(
            snapshot.device.homeyDeviceId,
          )}`;

          setKv(runtimeKv, [
            ['Lifecycle', snapshot.runtime.zwjs.lifecycle],
            ['Connected', snapshot.runtime.zwjs.transportConnected ? 'Yes' : 'No'],
            ['Server Version', snapshot.runtime.zwjs.serverVersion],
            ['Adapter Family', snapshot.runtime.zwjs.adapterFamily],
            ['Compiled Loaded', snapshot.runtime.compiledProfiles.loaded ? 'Yes' : 'No'],
            ['Compiled Entries', snapshot.runtime.compiledProfiles.entryCount],
            ['Curation Loaded', snapshot.runtime.curation.loaded ? 'Yes' : 'No'],
            ['Curation Entries', snapshot.runtime.curation.entryCount],
          ], { omitEmpty: true });

          setKv(runtimeAdvancedKv, [
            ['Last Message', asTimeOrNull(snapshot.runtime.zwjs.lastMessageAt)],
            ['Connected At', asTimeOrNull(snapshot.runtime.zwjs.connectedAt)],
            ['Compiled Fingerprint', snapshot.runtime.compiledProfiles.pipelineFingerprint, ' mono'],
            ['Compiled Generated At', asTimeOrNull(snapshot.runtime.compiledProfiles.generatedAt)],
            ['Compiled Source', snapshot.runtime.compiledProfiles.sourcePath, ' mono'],
            ['Compiled Error', snapshot.runtime.compiledProfiles.errorMessage],
            ['Curation Source', snapshot.runtime.curation.source],
            ['Curation Error', snapshot.runtime.curation.errorMessage],
          ], { omitEmpty: true });

          setKv(summaryKv, [
            ['Imported Nodes', snapshot.nodeSummary.total],
            ['Curation Entries', snapshot.nodeSummary.curationEntryCount],
            ['Recommendations', snapshot.nodeSummary.recommendationAvailableCount],
            ['Backfill Needed', snapshot.nodeSummary.recommendationBackfillCount],
            ['Inbound Skipped', snapshot.nodeSummary.inboundSkipped],
            ['Outbound Skipped', snapshot.nodeSummary.outboundSkipped],
          ]);

          const nodes = Array.isArray(snapshot.nodes)
            ? [...snapshot.nodes].sort((left, right) => {
                const byPriority = recommendationPriority(left) - recommendationPriority(right);
                if (byPriority !== 0) return byPriority;
                const leftNodeId =
                  typeof left.nodeId === 'number' && Number.isInteger(left.nodeId)
                    ? left.nodeId
                    : Number.MAX_SAFE_INTEGER;
                const rightNodeId =
                  typeof right.nodeId === 'number' && Number.isInteger(right.nodeId)
                    ? right.nodeId
                    : Number.MAX_SAFE_INTEGER;
                if (leftNodeId !== rightNodeId) return leftNodeId - rightNodeId;
                const leftId = left.homeyDeviceId ? String(left.homeyDeviceId) : '';
                const rightId = right.homeyDeviceId ? String(right.homeyDeviceId) : '';
                return leftId.localeCompare(rightId);
              })
            : [];
          const actionNeededNodes = nodes.filter((node) => recommendationPriority(node) < 2);
          filterActionNeededBtn.textContent = `Action Needed (${actionNeededNodes.length})`;
          filterAllBtn.textContent = `All (${nodes.length})`;
          const visibleNodes =
            state.filterMode === 'action-needed'
              ? actionNeededNodes
              : nodes;
          nodesMeta.textContent =
            nodes.length === 0
              ? 'No imported nodes available.'
              : state.filterMode === 'action-needed'
                ? `Showing ${visibleNodes.length} of ${nodes.length} imported nodes that require action.`
                : `Showing all ${nodes.length} imported nodes.`;

          if (visibleNodes.length === 0) {
            nodesEmpty.hidden = false;
            nodesTable.hidden = true;
            nodesTbody.innerHTML = '';
            nodesEmpty.textContent =
              nodes.length > 0 && state.filterMode === 'action-needed'
                ? 'No nodes currently require action. Switch to All to inspect every node.'
                : 'No imported node devices found.';
          } else {
            nodesEmpty.hidden = true;
            nodesTable.hidden = false;
            nodesTbody.innerHTML = visibleNodes
              .map((node) => {
                const nodeLabel = node.nodeId !== null ? `Node ${node.nodeId}` : 'Node n/a';
                const mapping = `${node.mapping.inboundEnabled}/${node.mapping.inboundConfigured} in, ${node.mapping.outboundEnabled}/${node.mapping.outboundConfigured} out`;
                return `<tr>
                  <td>${nodeLabel}<br/><span class=\"mono\">${asText(node.homeyDeviceId)}</span></td>
                  <td>${asText(node.profile.homeyClass)}<br/><span class=\"hint\">${asText(
                    profileConfidenceLabel(node),
                  )}</span></td>
                  <td><span class=\"mono\">${asText(
                    node.profile.profileId,
                  )}</span><br/><span class=\"hint\">${asText(profileSourceLabel(node))}</span></td>
                  <td>${recommendationPill(node)}<br/><span class=\"hint\">${recommendationLabel(
                    node,
                  )}</span><br/><span class=\"mono\">${asText(
                    node.recommendation.reason,
                  )}</span></td>
                  <td>${mapping}</td>
                </tr>`;
              })
              .join('');
          }
        }

        async function loadSnapshot(eventName) {
          state.loading = true;
          state.error = null;
          state.status = 'Refreshing diagnostics...';
          state.tone = 'neutral';
          render();
          try {
            state.snapshot = await Homey.emit(eventName);
            state.status = `Last updated ${asTime(state.snapshot.generatedAt)}`;
            state.tone = 'ok';
          } catch (error) {
            state.error =
              error && error.message ? error.message : 'Failed to load bridge diagnostics.';
            state.status = 'Bridge diagnostics unavailable.';
            state.tone = 'error';
          } finally {
            state.loading = false;
            render();
          }
        }

        refreshBtn.addEventListener('click', () => loadSnapshot('bridge_tools:refresh'));
        filterActionNeededBtn.addEventListener('click', () => {
          state.filterMode = 'action-needed';
          render();
        });
        filterAllBtn.addEventListener('click', () => {
          state.filterMode = 'all';
          render();
        });

        Homey.ready();
        loadSnapshot('bridge_tools:get_snapshot');
      })();
    </script>
  </body>
</html>
