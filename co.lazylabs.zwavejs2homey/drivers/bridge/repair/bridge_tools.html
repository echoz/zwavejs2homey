<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bridge Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .button {
        border: 1px solid var(--accent);
        background: var(--panel);
        color: var(--accent);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }

      @media (min-width: 980px) {
        .grid {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .section-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .section-toolbar h2 {
        margin: 0;
      }

      .toggle-group {
        display: inline-flex;
        gap: 6px;
      }

      .toggle-button {
        border: 1px solid var(--panel-border);
        background: transparent;
        color: var(--muted);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .toggle-button.is-active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(29, 78, 216, 0.08);
      }

      details {
        border: 1px dashed var(--panel-border);
        border-radius: 10px;
        padding: 8px 10px;
        background: rgba(100, 116, 139, 0.04);
      }

      details[open] {
        background: transparent;
      }

      summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::before {
        content: '▸ ';
      }

      details[open] summary::before {
        content: '▾ ';
      }

      .advanced-content {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .advanced-content h3 {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }

      .nodes-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .nodes-table th,
      .nodes-table td {
        text-align: left;
        border-bottom: 1px solid var(--panel-border);
        padding: 6px 4px;
        vertical-align: top;
      }

      .nodes-table th {
        color: var(--muted);
        font-weight: 600;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.danger {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .status {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.error {
        color: var(--danger);
      }

      .error {
        border: 1px solid rgba(185, 28, 28, 0.35);
        background: rgba(185, 28, 28, 0.08);
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div>
        <div class="title">Bridge Tools</div>
        <div id="subtitle" class="subtitle">Loading bridge diagnostics...</div>
      </div>
      <button id="refresh-btn" class="button">Refresh</button>
    </div>

    <div id="error-panel" class="panel error" hidden></div>

    <div class="grid">
      <section class="panel">
        <h2>Runtime</h2>
        <div id="runtime-kv" class="kv"></div>
      </section>
      <section class="panel">
        <h2>Node Summary</h2>
        <div id="summary-kv" class="kv"></div>
      </section>
    </div>

    <section class="panel" style="margin-top: 12px">
      <h2>Advanced</h2>
      <details>
        <summary>Show advanced diagnostics</summary>
        <div class="advanced-content">
          <h3>Runtime Detail</h3>
          <div id="runtime-advanced-kv" class="kv"></div>
          <h3>Recommendation Codes</h3>
          <div id="recommendation-codes-kv" class="kv"></div>
          <h3>Mapping Skip Reasons</h3>
          <div id="mapping-skip-reasons-kv" class="kv"></div>
        </div>
      </details>
    </section>

    <section class="panel" style="margin-top: 12px">
      <div class="section-toolbar">
        <h2>Nodes</h2>
        <div class="toggle-group">
          <button id="filter-action-needed-btn" class="toggle-button is-active">
            Action Needed
          </button>
          <button id="filter-all-btn" class="toggle-button">All</button>
        </div>
      </div>
      <div id="nodes-meta" class="hint" style="margin-bottom: 8px"></div>
      <div id="nodes-empty" class="hint" hidden>No imported node devices found.</div>
      <table id="nodes-table" class="nodes-table" hidden>
        <thead>
          <tr>
            <th>Node</th>
            <th>Identity</th>
            <th>Profile</th>
            <th>Recommendation</th>
            <th>Mapping</th>
          </tr>
        </thead>
        <tbody id="nodes-tbody"></tbody>
      </table>
    </section>

    <div id="status" class="status">Initializing...</div>

    <script src="./bridge_tools.presenter.js"></script>
    <script src="./bridge_tools.page.js"></script>
  </body>
</html>
