<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configure Bridge</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0 auto;
        padding: 16px;
        max-inline-size: 640px;
      }

      .bridge-meta {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 6px 12px;
        font-size: 14px;
      }

      .bridge-meta-key {
        opacity: 0.75;
      }

      .bridge-meta-value {
        overflow-wrap: anywhere;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        inline-size: fit-content;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: #1d7a3f;
        background: rgba(29, 122, 63, 0.12);
        border-color: rgba(29, 122, 63, 0.38);
      }

      .status-pill.warn {
        color: #9a5a05;
        background: rgba(154, 90, 5, 0.12);
        border-color: rgba(154, 90, 5, 0.38);
      }

      .token-hint {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.7;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      @media (min-width: 500px) {
        .actions {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .status-line {
        margin-top: 16px;
        font-size: 13px;
        opacity: 0.85;
      }

      .error-line {
        margin-top: 8px;
        color: #ba1a1a;
        font-size: 13px;
      }

      .disabled {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header class="homey-header">
      <h1 class="homey-title">Configure Bridge Connection</h1>
      <p class="homey-subtitle">
        Set the Z-Wave JS UI WebSocket URL and authentication for this bridge.
      </p>
    </header>

    <form id="bridge-config-form" class="homey-form" novalidate>
      <fieldset class="homey-form-fieldset">
        <legend class="homey-form-legend">Bridge</legend>
        <div class="bridge-meta">
          <div class="bridge-meta-key">Name</div>
          <div class="bridge-meta-value" id="bridge-name">Bridge</div>
          <div class="bridge-meta-key">Bridge ID</div>
          <div class="bridge-meta-value" id="bridge-id">main</div>
          <div class="bridge-meta-key">Pairing</div>
          <div class="bridge-meta-value" id="pair-status">
            <span class="status-pill warn">Loading</span>
          </div>
        </div>
      </fieldset>

      <fieldset class="homey-form-fieldset">
        <legend class="homey-form-legend">Connection</legend>
        <div class="homey-form-group">
          <label class="homey-form-label" for="zwjs-url">WebSocket URL</label>
          <input
            id="zwjs-url"
            class="homey-form-input"
            type="url"
            placeholder="ws://192.168.1.15:3000"
            autocomplete="off"
          />
        </div>

        <div class="homey-form-group">
          <label class="homey-form-label" for="zwjs-auth-type">Authentication</label>
          <select id="zwjs-auth-type" class="homey-form-select">
            <option value="none">None</option>
            <option value="bearer">Bearer token</option>
          </select>
        </div>

        <div id="zwjs-token-wrap" class="homey-form-group" hidden>
          <label class="homey-form-label" for="zwjs-token">Bearer token</label>
          <input
            id="zwjs-token"
            class="homey-form-input"
            type="password"
            placeholder="Paste token"
            autocomplete="off"
          />
          <p id="zwjs-token-hint" class="token-hint"></p>
        </div>
      </fieldset>

      <div class="actions">
        <button id="save-btn" type="button" class="homey-button-primary-full">
          Save and Continue
        </button>
        <button id="done-btn" type="button" class="homey-button-secondary-shadow">Done</button>
      </div>

      <p id="status-line" class="status-line">Loading bridge context...</p>
      <p id="error-line" class="error-line" hidden></p>
    </form>

    <script src="./bridge_config.presenter.js"></script>
    <script src="./bridge_config.page.js"></script>
  </body>
</html>
