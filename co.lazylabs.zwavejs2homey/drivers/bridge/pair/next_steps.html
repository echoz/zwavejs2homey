<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bridge Added</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --accent: #1d4ed8;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 8px 0;
        color: var(--muted);
        line-height: 1.4;
      }

      ol {
        margin: 12px 0;
        padding-left: 18px;
      }

      li {
        margin: 6px 0;
      }

      .button {
        margin-top: 12px;
        width: 100%;
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>Bridge Added</h1>
      <p>The ZWJS Bridge is now paired with Homey.</p>
      <p>Next step: import your Z-Wave nodes.</p>
      <ol>
        <li>Go back to Add Device.</li>
        <li>Select <strong>ZWJS Node</strong>.</li>
        <li>Choose the nodes you want to import.</li>
      </ol>
      <button id="done-btn" class="button">Done</button>
    </section>

    <script>
      (function () {
        const doneBtn = document.getElementById('done-btn');
        doneBtn.addEventListener('click', () => {
          Homey.done();
        });
        Homey.ready();
      })();
    </script>
  </body>
</html>
