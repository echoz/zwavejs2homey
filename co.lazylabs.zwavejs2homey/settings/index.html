<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZWJS Connection</title>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 16px;
        color: var(--homey-text-color, #1f2937);
        background: var(--homey-background-color, #ffffff);
      }

      h1 {
        font-size: 1.1rem;
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 12px;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 6px;
      }

      input,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        font-size: 14px;
        color: var(--homey-text-color, #1f2937);
        background: var(--homey-background-color, #ffffff);
        border: 1px solid var(--homey-line-color, #d1d5db);
        border-radius: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .message {
        margin-top: 12px;
        font-size: 13px;
      }

      .muted {
        opacity: 0.8;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>ZWJS Connection</h1>
    <p class="muted">Configure how this app connects to your Z-Wave JS UI server.</p>

    <label for="url">WebSocket URL</label>
    <input id="url" type="text" placeholder="ws://192.168.1.15:3000" />

    <label for="authType">Authentication</label>
    <select id="authType">
      <option value="none">None</option>
      <option value="bearer">Bearer token</option>
    </select>

    <div id="tokenWrap" class="hidden">
      <label for="token">Bearer token</label>
      <input id="token" type="password" placeholder="Paste token" />
    </div>

    <div class="row">
      <button id="saveBtn" type="button">Save</button>
      <button id="resetBtn" type="button">Reset To Defaults</button>
    </div>

    <p id="status" class="message muted"></p>

    <script>
      const SETTINGS_KEY = 'zwjs_connection';
      const DEFAULT_URL = 'ws://127.0.0.1:3000';

      const urlInput = document.getElementById('url');
      const authTypeSelect = document.getElementById('authType');
      const tokenWrap = document.getElementById('tokenWrap');
      const tokenInput = document.getElementById('token');
      const saveBtn = document.getElementById('saveBtn');
      const resetBtn = document.getElementById('resetBtn');
      const status = document.getElementById('status');

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError
          ? 'var(--homey-color-red, #b00020)'
          : 'var(--homey-text-color-light, #6b7280)';
      }

      function updateTokenVisibility() {
        const needsToken = authTypeSelect.value === 'bearer';
        tokenWrap.classList.toggle('hidden', !needsToken);
      }

      function isWsUrl(value) {
        try {
          const parsed = new URL(value);
          return parsed.protocol === 'ws:' || parsed.protocol === 'wss:';
        } catch (_error) {
          return false;
        }
      }

      function normalizeLoadedSettings(raw) {
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
          return {
            url: DEFAULT_URL,
            authType: 'none',
            token: '',
          };
        }

        const url = typeof raw.url === 'string' && raw.url.trim() ? raw.url.trim() : DEFAULT_URL;
        const auth =
          raw.auth && typeof raw.auth === 'object' && !Array.isArray(raw.auth) ? raw.auth : null;
        const authType = auth && auth.type === 'bearer' ? 'bearer' : 'none';
        const token =
          authType === 'bearer' && typeof auth.token === 'string' ? auth.token.trim() : '';

        return { url, authType, token };
      }

      function getPayloadOrError() {
        const url = urlInput.value.trim();
        const authType = authTypeSelect.value;
        const token = tokenInput.value.trim();

        if (!url) {
          return { error: 'WebSocket URL is required.' };
        }
        if (!isWsUrl(url)) {
          return { error: 'URL must start with ws:// or wss://.' };
        }
        if (authType === 'bearer' && !token) {
          return { error: 'Bearer token is required when authentication is bearer.' };
        }

        if (authType === 'bearer') {
          return {
            payload: {
              url,
              auth: {
                type: 'bearer',
                token,
              },
            },
          };
        }

        return {
          payload: {
            url,
            auth: { type: 'none' },
          },
        };
      }

      function loadSettings(Homey) {
        Homey.get(SETTINGS_KEY, (error, raw) => {
          if (error) {
            setStatus(`Failed to load settings: ${error.message || error}`, true);
            Homey.ready();
            return;
          }

          const settings = normalizeLoadedSettings(raw);
          urlInput.value = settings.url;
          authTypeSelect.value = settings.authType;
          tokenInput.value = settings.token;
          updateTokenVisibility();
          setStatus('Settings loaded.');
          Homey.ready();
        });
      }

      function wireEvents(Homey) {
        authTypeSelect.addEventListener('change', () => {
          updateTokenVisibility();
        });

        saveBtn.addEventListener('click', () => {
          const result = getPayloadOrError();
          if (result.error) {
            setStatus(result.error, true);
            return;
          }

          Homey.set(SETTINGS_KEY, result.payload, (error) => {
            if (error) {
              setStatus(`Failed to save settings: ${error.message || error}`, true);
              return;
            }
            setStatus('Saved. Connection will be reloaded automatically.');
          });
        });

        resetBtn.addEventListener('click', () => {
          const payload = {
            url: DEFAULT_URL,
            auth: { type: 'none' },
          };
          Homey.set(SETTINGS_KEY, payload, (error) => {
            if (error) {
              setStatus(`Failed to reset settings: ${error.message || error}`, true);
              return;
            }
            urlInput.value = DEFAULT_URL;
            authTypeSelect.value = 'none';
            tokenInput.value = '';
            updateTokenVisibility();
            setStatus('Reset to defaults. Connection will be reloaded automatically.');
          });
        });
      }

      function onHomeyReady(Homey) {
        wireEvents(Homey);
        loadSettings(Homey);
      }
    </script>
  </body>
</html>
