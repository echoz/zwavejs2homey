<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZWJS Connection</title>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 16px;
        color: var(--text);
        background: var(--bg);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 980px) {
        .grid {
          grid-template-columns: minmax(0, 1fr) minmax(320px, 40%);
        }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
      }

      h1 {
        font-size: 1.1rem;
        margin: 0 0 12px;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      p {
        margin: 0 0 12px;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 6px;
      }

      input,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        font-size: 14px;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        color: var(--accent);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .muted {
        color: var(--muted);
      }

      .hidden {
        display: none;
      }

      .message {
        margin-top: 12px;
        font-size: 13px;
      }

      .message.ok {
        color: var(--ok);
      }

      .message.warn {
        color: var(--warn);
      }

      .message.error {
        color: var(--danger);
      }

      .kv {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.error {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .warnings {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .warnings li {
        color: var(--warn);
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <section class="panel">
        <h1>ZWJS Connection</h1>
        <p class="muted">Configure how this app connects to your Z-Wave JS UI server.</p>

        <label for="url">WebSocket URL</label>
        <input id="url" type="text" placeholder="ws://192.168.1.15:3000" />

        <label for="authType">Authentication</label>
        <select id="authType">
          <option value="none">None</option>
          <option value="bearer">Bearer token</option>
        </select>

        <div id="tokenWrap" class="hidden">
          <label for="token">Bearer token</label>
          <input id="token" type="password" placeholder="Paste token" />
        </div>

        <div class="row">
          <button id="saveBtn" class="primary" type="button">Save</button>
          <button id="resetBtn" type="button">Reset To Defaults</button>
        </div>

        <p id="status" class="message muted"></p>
      </section>

      <section class="panel">
        <h2>Runtime Diagnostics</h2>
        <div id="runtime-kv" class="kv"></div>
        <div id="runtime-hint" class="hint">Diagnostics not loaded yet.</div>
        <ul id="warnings" class="warnings" hidden></ul>
        <div class="row">
          <button id="refreshDiagnosticsBtn" type="button">Refresh Diagnostics</button>
          <button id="openBridgeToolsBtn" type="button">Open Bridge Tools</button>
        </div>
      </section>
    </div>

    <script src="./settings.presenter.js"></script>
    <script src="./settings.page.js"></script>
  </body>
</html>
