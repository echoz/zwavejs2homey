<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZWJS2Homey Settings</title>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-border: #d8dfec;
        --text: #1f2937;
        --muted: #64748b;
        --ok: #0f766e;
        --warn: #b45309;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 16px;
        color: var(--text);
        background: var(--bg);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
        max-width: 980px;
      }

      h1 {
        font-size: 1.1rem;
        margin: 0 0 10px;
      }

      h2 {
        margin: 14px 0 8px;
        font-size: 14px;
      }

      p {
        margin: 0 0 10px;
      }

      .muted {
        color: var(--muted);
      }

      .message {
        margin-top: 12px;
        font-size: 13px;
      }

      .message.ok {
        color: var(--ok);
      }

      .message.warn {
        color: var(--warn);
      }

      .message.error {
        color: var(--danger);
      }

      .kv {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }

      .kv .k {
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid transparent;
      }

      .status-pill.ok {
        color: var(--ok);
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.35);
      }

      .status-pill.warn {
        color: var(--warn);
        background: rgba(180, 83, 9, 0.1);
        border-color: rgba(180, 83, 9, 0.35);
      }

      .status-pill.error {
        color: var(--danger);
        background: rgba(185, 28, 28, 0.1);
        border-color: rgba(185, 28, 28, 0.35);
      }

      .warnings {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .warnings li {
        color: var(--warn);
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      @media (min-width: 760px) {
        .row {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      button {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        font-size: 14px;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .inline-option {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .inline-option input[type='checkbox'] {
        width: auto;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>App Diagnostics</h1>
      <p class="muted">
        Bridge connection settings are configured per <strong>ZWJS Bridge</strong> device during
        pairing or in that device's advanced settings.
      </p>

      <h2>Runtime Diagnostics</h2>
      <div id="runtime-kv" class="kv"></div>
      <div id="runtime-hint" class="hint">Diagnostics not loaded yet.</div>
      <ul id="warnings" class="warnings" hidden></ul>

      <div class="row">
        <button id="refreshDiagnosticsBtn" type="button">Refresh Diagnostics</button>
        <button id="openBridgeToolsBtn" type="button">Bridge Tools Help</button>
        <button id="exportSupportBundleBtn" type="button">Export Support Bundle</button>
      </div>

      <label class="inline-option" for="redactSupportBundle">
        <input id="redactSupportBundle" type="checkbox" checked />
        Redact support bundle for sharing
      </label>

      <p id="status" class="message muted">Diagnostics page ready.</p>
    </section>

    <script src="./settings.presenter.js"></script>
    <script src="./settings.page.js"></script>
  </body>
</html>
